name: "SOC2 Compliance Audit"
description: "Run a SOC2 compliance audit on GitHub repositories using AI agents. Checks branch protection, CI/CD, secrets management, access controls, and more."

branding:
  icon: shield
  color: blue

inputs:
  repos:
    description: "Repos to audit (comma-separated, e.g. org/repo1,org/repo2). Defaults to the calling repo."
    required: false
    default: ""
  opper-api-key:
    description: "Opper API key for the LLM agents"
    required: true
  github-token:
    description: "GitHub token for API access. Needs read access to repos being audited."
    required: false
    default: ${{ github.token }}
  model:
    description: "Opper model identifier for the LLM agents (e.g. gcp/claude-sonnet-4.5-eu, anthropic/claude-sonnet-4)"
    required: false
    default: "gcp/claude-sonnet-4.5-eu"
  upload-artifact:
    description: "Whether to upload the report as a workflow artifact"
    required: false
    default: "true"
  create-issues:
    description: "Create or update GitHub Issues for critical and high findings"
    required: false
    default: "false"
  auto-fix:
    description: "Attempt to fix findings using an Opper agent and open PRs (implies create-issues)"
    required: false
    default: "false"

outputs:
  report-path:
    description: "Path to the generated SOC2 report"
    value: ${{ steps.audit.outputs.report-path }}
  total-findings:
    description: "Total number of findings"
    value: ${{ steps.audit.outputs.total-findings }}
  critical:
    description: "Number of critical findings"
    value: ${{ steps.audit.outputs.critical }}
  high:
    description: "Number of high findings"
    value: ${{ steps.audit.outputs.high }}
  medium:
    description: "Number of medium findings"
    value: ${{ steps.audit.outputs.medium }}
  low:
    description: "Number of low findings"
    value: ${{ steps.audit.outputs.low }}
  risk-level:
    description: "Overall risk level (Critical, High, Medium, Low)"
    value: ${{ steps.audit.outputs.risk-level }}
  repos-audited:
    description: "Number of repositories audited"
    value: ${{ steps.audit.outputs.repos-audited }}
  categories-checked:
    description: "Number of SOC2 categories checked"
    value: ${{ steps.audit.outputs.categories-checked }}

runs:
  using: composite
  steps:
    - name: Checkout calling repository
      uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      with:
        token: ${{ inputs.github-token }}

    - name: Setup Node 20
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: "20"

    - name: Install dependencies
      shell: bash
      run: npm ci
      working-directory: ${{ github.action_path }}

    - name: Validate inputs
      shell: bash
      env:
        INPUT_REPOS: ${{ inputs.repos }}
      run: |
        REPOS="${INPUT_REPOS}"
        if [ -z "$REPOS" ]; then
          REPOS="${{ github.repository }}"
        fi

        # Validate each repo matches owner/name format
        IFS=',' read -ra REPO_LIST <<< "$REPOS"
        for repo in "${REPO_LIST[@]}"; do
          repo=$(echo "$repo" | xargs)  # trim whitespace
          if [[ ! "$repo" =~ ^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$ ]]; then
            echo "::error::Invalid repo format: '$repo'. Expected 'owner/repo'."
            exit 1
          fi
        done
        echo "validated-repos=$REPOS" >> "$GITHUB_OUTPUT"
      id: validate

    - name: Run SOC2 audit
      id: audit
      shell: bash
      env:
        OPPER_API_KEY: ${{ inputs.opper-api-key }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        MODEL: ${{ inputs.model }}
        VALIDATED_REPOS: ${{ steps.validate.outputs.validated-repos }}
        CREATE_ISSUES: ${{ inputs.create-issues == 'true' || inputs.auto-fix == 'true' }}
        AUTO_FIX: ${{ inputs.auto-fix }}
      working-directory: ${{ github.action_path }}
      run: |
        npx tsx src/main.ts

        REPORT=$(ls -t "$GITHUB_WORKSPACE"/soc2-report-*.md 2>/dev/null | head -1)
        if [ -z "$REPORT" ]; then
          echo "::error::Audit completed but no report file was generated."
          exit 1
        fi

        echo "report-path=$REPORT" >> "$GITHUB_OUTPUT"
        echo "::notice::SOC2 report generated: $(basename "$REPORT")"

    - name: Upload report
      if: ${{ inputs.upload-artifact == 'true' && steps.audit.outputs.report-path != '' }}
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: soc2-report-${{ github.run_id }}-${{ github.run_attempt }}
        path: ${{ steps.audit.outputs.report-path }}
